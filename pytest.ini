# pytest configuration for SensorCalibrator

[tool.pytest.ini_options]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage options (if pytest-cov is installed)
# addopts = --cov=sensor_calibrator --cov-report=html --cov-report=term

# Timeout (if pytest-timeout is installed)
# timeout = 300

[coverage:run]
source = sensor_calibrator
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
